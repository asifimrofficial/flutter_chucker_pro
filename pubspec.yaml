name: flutter_chucker_pro
description: "A Flutter network inspection toolkit with a draggable overlay dashboard, Dio capture, Isar persistence, cURL export, and shareable logs."
version: 0.0.1
homepage: https://pub.dev/packages/flutter_chucker_pro
topics:
  - debugging
  - dio
  - network
  - inspector
  - chucker

environment:
  sdk: ^3.8.0
  flutter: ">=3.22.0"

dependencies:
  collection: ^1.19.1
  dio: ^5.9.2
  flutter:
    sdk: flutter
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  meta: ^1.18.0
  path: ^1.9.1
  path_provider: ^2.1.6
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
