version: 0.0.1
homepage: https://pub.dev/packages/flutter_chucker_pro
topics:
  - debugging
  - dio
  - network
  - inspector
  - chucker

environment:
  sdk: ^3.8.0
  flutter: ">=3.22.0"

dependencies:
  collection: ^1.19.1
  dio: ^5.9.2
  flutter:
    sdk: flutter
  meta: ^1.18.0
  path: ^1.9.1
  path_provider: ^2.1.6
  sembast: ^3.8.9
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
